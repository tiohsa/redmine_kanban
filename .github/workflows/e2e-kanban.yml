name: Kanban CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  init:
    name: init
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install E2E dependencies
        run: npm ci --prefix e2e

      - name: Validate E2E Docker Compose configuration
        run: docker compose -f .github/e2e/docker-compose.yml config

  build:
    name: build
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend assets
        run: npm --prefix frontend run build

  lint:
    name: lint
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint frontend
        run: npm --prefix frontend run lint

  typecheck:
    name: typecheck
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Typecheck frontend
        run: npm --prefix frontend run typecheck

  test:
    name: test
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run frontend unit tests
        run: npm --prefix frontend run test -- --run

  e2e-redmine-61:
    name: Redmine 6.1 Full E2E
    needs:
      - build
      - lint
      - typecheck
      - test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REDMINE_IMAGE: redmine:6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend assets
        run: npm --prefix frontend run build

      - name: Install E2E dependencies
        run: npm ci --prefix e2e

      - name: Install Playwright browser
        run: npx --prefix e2e playwright install --with-deps chromium

      - name: Start Redmine stack and wait for health
        run: |
          docker compose -f .github/e2e/docker-compose.yml up -d --wait --wait-timeout 600
          docker compose -f .github/e2e/docker-compose.yml ps

      - name: Configure Redmine database.yml for production
        run: |
          docker compose -f .github/e2e/docker-compose.yml exec -T redmine sh -lc \
            "printf '%s\n' \
            'production:' \
            '  adapter: mysql2' \
            '  database: redmine' \
            '  host: db' \
            '  username: redmine' \
            '  password: password' \
            '  encoding: utf8mb4' \
            > /usr/src/redmine/config/database.yml"

      - name: Migrate Redmine and plugin
        run: |
          docker compose -f .github/e2e/docker-compose.yml exec -T redmine \
            env RAILS_ENV=production bundle exec rake db:migrate redmine:plugins:migrate

      - name: Load default data
        run: |
          docker compose -f .github/e2e/docker-compose.yml exec -T redmine \
            env REDMINE_LANG=en RAILS_ENV=production bundle exec rake redmine:load_default_data

      - name: Seed project/module for E2E
        run: |
          docker compose -f .github/e2e/docker-compose.yml exec -T redmine \
            bundle exec rails runner -e production plugins/redmine_kanban/e2e/setup_redmine.rb

      - name: Run Playwright E2E
        env:
          REDMINE_BASE_URL: http://127.0.0.1:3002
          CI: true
        run: npx --prefix e2e playwright test -c e2e/playwright.config.js

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          if-no-files-found: ignore

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f .github/e2e/docker-compose.yml logs --no-color

      - name: Stop Redmine stack
        if: always()
        run: docker compose -f .github/e2e/docker-compose.yml down -v

  e2e-redmine-60-compat:
    name: Redmine 6.0 Compatibility Smoke
    needs:
      - build
      - lint
      - typecheck
      - test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REDMINE_IMAGE: redmine:6.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend assets
        run: npm --prefix frontend run build

      - name: Install E2E dependencies
        run: npm ci --prefix e2e

      - name: Install Playwright browser
        run: npx --prefix e2e playwright install --with-deps chromium

      - name: Start Redmine stack and wait for health
        run: |
          docker compose -f .github/e2e/docker-compose.yml up -d --wait --wait-timeout 600
          docker compose -f .github/e2e/docker-compose.yml ps

      - name: Configure Redmine database.yml for production
        run: |
          docker compose -f .github/e2e/docker-compose.yml exec -T redmine sh -lc \
            "printf '%s\n' \
            'production:' \
            '  adapter: mysql2' \
            '  database: redmine' \
            '  host: db' \
            '  username: redmine' \
            '  password: password' \
            '  encoding: utf8mb4' \
            > /usr/src/redmine/config/database.yml"

      - name: Migrate Redmine and plugin
        run: |
          docker compose -f .github/e2e/docker-compose.yml exec -T redmine \
            env RAILS_ENV=production bundle exec rake db:migrate redmine:plugins:migrate

      - name: Load default data
        run: |
          docker compose -f .github/e2e/docker-compose.yml exec -T redmine \
            env REDMINE_LANG=en RAILS_ENV=production bundle exec rake redmine:load_default_data

      - name: Seed project/module for E2E
        run: |
          docker compose -f .github/e2e/docker-compose.yml exec -T redmine \
            bundle exec rails runner -e production plugins/redmine_kanban/e2e/setup_redmine.rb

      - name: Run Playwright compatibility smoke
        env:
          REDMINE_BASE_URL: http://127.0.0.1:3002
          CI: true
        run: npx --prefix e2e playwright test -c e2e/playwright.config.js e2e/tests/kanban-smoke.spec.js

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-redmine-60
          path: e2e/playwright-report
          if-no-files-found: ignore

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f .github/e2e/docker-compose.yml logs --no-color

      - name: Stop Redmine stack
        if: always()
        run: docker compose -f .github/e2e/docker-compose.yml down -v
