services:
  db:
    image: mariadb:10
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: redmine
      MYSQL_USER: redmine
      MYSQL_PASSWORD: password
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  redmine:
    image: ${REDMINE_IMAGE:-redmine:6.1}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3002:3000"
    environment:
      REDMINE_DB_MYSQL: db
      REDMINE_DB_DATABASE: redmine
      REDMINE_DB_USERNAME: redmine
      REDMINE_DB_PASSWORD: password
      REDMINE_SECRET_KEY_BASE: test_secret_key_base
      SECRET_KEY_BASE: test_secret_key_base
      RAILS_ENV: production
    volumes:
      - ../../:/usr/src/redmine/plugins/redmine_kanban
    healthcheck:
      test: ["CMD-SHELL", "ruby -rsocket -e \"TCPSocket.new('127.0.0.1', 3000).close\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
